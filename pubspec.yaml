name: klubconnect
description: A comprehensive club management platform for colleges
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4

  # UI & Styling
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Utilities
  intl: ^0.20.2

  # Image Handling
  image_picker: ^1.0.4
  flutter_image_compress: ^2.1.0

  # Other
  fluttertoast: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/