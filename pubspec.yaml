name: klub_connect
description: A comprehensive club management platform for colleges
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4

  # UI & Styling
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  cached_network_image: ^3.4.1
  font_awesome_flutter: ^10.8.0

  # State Management
  provider: ^6.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1

  # Image Handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Other
  fluttertoast: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/logo_icon.png"
  min_sdk_android: 21
